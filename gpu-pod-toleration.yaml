apiVersion: v1
kind: Pod
metadata:
  name: ml-training-pod
spec:
  nodeSelector:
    accelerator: nvidia-gpu
  tolerations:
  - key: dedicated
    operator: Equal
    value: gpu-workload
    effect: NoSchedule
  containers:
  - name: trainer
    image: nvidia/cuda:11.8.0-base-ubuntu22.04
    command: ["sh", "-c", "nvidia-smi && sleep 60"]
    resources:
      limits:
        nvidia.com/gpu: "1"
