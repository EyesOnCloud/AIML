apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-logging
  namespace: efklog
  labels:
    k8s-app: elasticsearch-logging
spec:
  clusterIP: None  # Headless service
  selector:
    k8s-app: elasticsearch-logging
    version: v7.10.2
  ports:
    - port: 9200
      name: http
    - port: 9300
      name: transport
