apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: bankbot
type: Opaque
data:
  POSTGRES_PASSWORD: QmFua0JvdEAxMjM=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: bankbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: bankbot
        - name: POSTGRES_USER
          value: bankbot
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bankbot
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
