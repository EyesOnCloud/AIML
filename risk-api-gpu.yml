apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-api
  namespace: bankbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-api
  template:
    metadata:
      labels:
        app: risk-api
    spec:
      containers:
      - name: risk-api
        image: eyesoncloud/risk-api:gpu
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: risk-config
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: risk-api
  namespace: bankbot
spec:
  selector:
    app: risk-api
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
