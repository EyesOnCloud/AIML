apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-api
  namespace: bankbot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      containers:
      - name: chat-api
        image: eyesoncloud/chat-api:gpu
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: chat-config
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: chat-api
  namespace: bankbot
spec:
  selector:
    app: chat-api
  type: NodePort
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 31010
  
