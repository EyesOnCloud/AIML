apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: qdrant

spec:
  serviceName: qdrant
  replicas: 2

  selector:
    matchLabels:
      app: qdrant

  template:
    metadata:
      labels:
        app: qdrant

    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant

          ports:
            - containerPort: 6333

          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage

  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage

      spec:
        accessModes:
          - ReadWriteMany

        storageClassName: csi-nfs

        resources:
          requests:
            storage: 1Gi
