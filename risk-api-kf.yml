apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-api
  namespace: banking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: risk-api
  template:
    metadata:
      labels:
        app: risk-api
    spec:
      containers:
      - name: risk-api
        image: eyesoncloud/risk-api:v1
        ports:
        - containerPort: 8001
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: risk-api
  namespace: banking-app
spec:
  selector:
    app: risk-api
  ports:
  - port: 8001
    targetPort: 8001
