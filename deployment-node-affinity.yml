apiVersion: apps/v1
kind: Deployment
metadata:
  name: hard-node-affinity
spec:
  replicas: 4
  selector:
    matchLabels:
      app: hard-affinity
  template:
    metadata:
      labels:
        app: hard-affinity
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - us-east-1
                      - us-east-2
      containers:
        - name: webapp
          image: nginx
