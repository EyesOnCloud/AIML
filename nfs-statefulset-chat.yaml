apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chat-app
spec:
  serviceName: chat-app
  replicas: 2

  selector:
    matchLabels:
      app: chat-app
      tier: ai

  template:
    metadata:
      labels:
        app: chat-app
        tier: ai

    spec:
      containers:
      - name: chat-app
        image: eyesoncloud/chat-app:v4

        ports:
        - containerPort: 8080
          name: http

        volumeMounts:
        - name: app-storage
          mountPath: /data

  volumeClaimTemplates:
  - metadata:
      name: app-storage
    spec:
      accessModes:
      - ReadWriteMany

      storageClassName: csi-nfs

      resources:
        requests:
          storage: 1Gi
